name: Build/Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest # macOS build disabled until signing creds are set up

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build/release Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true
          # Publish as non-draft so release is visible on GitHub Releases page
          args: --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_DRAFT: false
          EP_PRE_RELEASE: false
