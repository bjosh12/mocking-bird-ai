appId: com.interviewcopilot.app
productName: Interview Copilot
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target: dmg
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
linux:
  target: AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
